<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">PicoFlow network comparison</title>
  <desc id="desc">Comparison between Arbitrum One mainnet, Arc Testnet and future Arc Mainnet.</desc>
  <rect width="1200" height="420" rx="28" fill="#F8F6F1"/>
  <text x="50" y="58" font-family="Inter,Segoe UI,Arial" font-size="31" font-weight="800" fill="#1E2330">Mainnet proof today, Arc-native path tomorrow</text>
  <text x="50" y="88" font-family="Inter,Segoe UI,Arial" font-size="16" fill="#4A5468">PicoFlow presents the Arbitrum One deployment as a real-funds production proof, while Arc Testnet demonstrates the exact chain flow for Arc Mainnet once launched.</text>
  <g font-family="Inter,Segoe UI,Arial">
    <g transform="translate(50 132)">
      <rect width="340" height="220" rx="22" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
      <text x="26" y="38" font-size="22" font-weight="800" fill="#065F46">Arbitrum One</text>
      <text x="26" y="66" font-size="13" font-weight="700" fill="#047857">LIVE MAINNET · REAL USDC</text>
      <text x="26" y="103" font-size="15" fill="#1E2330">chainId 42161</text>
      <text x="26" y="132" font-size="14" fill="#4A5468">Used as the real-life working example: funded wallets, mainnet addresses, public ledger rows and explorer links.</text>
      <text x="26" y="188" font-size="13" fill="#047857">Purpose: prove customers can pay today.</text>
    </g>
    <g transform="translate(430 132)">
      <rect width="340" height="220" rx="22" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
      <text x="26" y="38" font-size="22" font-weight="800" fill="#92400E">Arc Testnet</text>
      <text x="26" y="66" font-size="13" font-weight="700" fill="#B45309">ARC REHEARSAL · TEST FUNDS</text>
      <text x="26" y="103" font-size="15" fill="#1E2330">chainId 5042002</text>
      <text x="26" y="132" font-size="14" fill="#4A5468">Used to prove Arc-specific contracts, USDC gas flow, ProofMesh events and Gateway-compatible settlement semantics.</text>
      <text x="26" y="188" font-size="13" fill="#B45309">Purpose: prove Arc readiness without fake mainnet claims.</text>
    </g>
    <g transform="translate(810 132)">
      <rect width="340" height="220" rx="22" fill="#EEF2FF" stroke="#3B5BDB" stroke-width="2"/>
      <text x="26" y="38" font-size="22" font-weight="800" fill="#1E3A8A">Arc Mainnet</text>
      <text x="26" y="66" font-size="13" font-weight="700" fill="#3B5BDB">DROP-IN TARGET WHEN PUBLIC</text>
      <text x="26" y="103" font-size="15" fill="#1E2330">chainId: pending Circle publication</text>
      <text x="26" y="132" font-size="14" fill="#4A5468">Same app, same ledger states, same contracts, same Gateway batch worker; switch server chain config and redeploy addresses.</text>
      <text x="26" y="188" font-size="13" fill="#3B5BDB">Purpose: final sponsor-aligned production target.</text>
    </g>
  </g>
  <text x="50" y="388" font-family="Inter,Segoe UI,Arial" font-size="13" fill="#4A5468">No fake numbers: only measured ledger, provider and explorer data are labeled real; planned Arc Mainnet behavior is labeled as drop-in readiness.</text>
</svg>
