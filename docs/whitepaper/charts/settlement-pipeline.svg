<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">PicoFlow settlement pipeline</title>
  <desc id="desc">A six step pipeline from API client to ledger confirmation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#F8F6F1"/><stop offset="1" stop-color="#EEF2FF"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1E2330" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#3B5BDB"/></marker>
  </defs>
  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <text x="48" y="56" font-family="Inter,Segoe UI,Arial" font-size="30" font-weight="800" fill="#1E2330">One normal API request becomes a provable USDC settlement</text>
  <text x="48" y="86" font-family="Inter,Segoe UI,Arial" font-size="16" fill="#4A5468">Arbitrum One is the live real-funds proof today; Arc Testnet proves the Arc execution path until Arc Mainnet is published.</text>
  <g font-family="Inter,Segoe UI,Arial" filter="url(#shadow)">
    <g transform="translate(48 130)"><rect width="150" height="128" rx="18" fill="#FCFAF5" stroke="#D9D5CC"/><circle cx="28" cy="30" r="14" fill="#3B5BDB"/><text x="28" y="35" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">1</text><text x="24" y="66" font-size="16" font-weight="800" fill="#1E2330">API client</text><text x="24" y="92" font-size="12" fill="#4A5468">Bearer key or x402</text><text x="24" y="110" font-size="12" fill="#4A5468">signed intent</text></g>
    <g transform="translate(240 130)"><rect width="150" height="128" rx="18" fill="#FCFAF5" stroke="#D9D5CC"/><circle cx="28" cy="30" r="14" fill="#3B5BDB"/><text x="28" y="35" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">2</text><text x="24" y="66" font-size="16" font-weight="800" fill="#1E2330">TollBooth</text><text x="24" y="92" font-size="12" fill="#4A5468">verifies price, key,</text><text x="24" y="110" font-size="12" fill="#4A5468">signature, quota</text></g>
    <g transform="translate(432 130)"><rect width="150" height="128" rx="18" fill="#FCFAF5" stroke="#D9D5CC"/><circle cx="28" cy="30" r="14" fill="#3B5BDB"/><text x="28" y="35" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">3</text><text x="24" y="66" font-size="16" font-weight="800" fill="#1E2330">Provider</text><text x="24" y="92" font-size="12" fill="#4A5468">Gemini, AIsa,</text><text x="24" y="110" font-size="12" fill="#4A5468">Featherless, AI/ML</text></g>
    <g transform="translate(624 130)"><rect width="150" height="128" rx="18" fill="#FCFAF5" stroke="#D9D5CC"/><circle cx="28" cy="30" r="14" fill="#3B5BDB"/><text x="28" y="35" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">4</text><text x="24" y="66" font-size="16" font-weight="800" fill="#1E2330">Ledger row</text><text x="24" y="92" font-size="12" fill="#4A5468">action, cost, margin,</text><text x="24" y="110" font-size="12" fill="#4A5468">split recipients</text></g>
    <g transform="translate(816 130)"><rect width="150" height="128" rx="18" fill="#FCFAF5" stroke="#D9D5CC"/><circle cx="28" cy="30" r="14" fill="#3B5BDB"/><text x="28" y="35" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">5</text><text x="24" y="66" font-size="16" font-weight="800" fill="#1E2330">Gateway</text><text x="24" y="92" font-size="12" fill="#4A5468">batch and net</text><text x="24" y="110" font-size="12" fill="#4A5468">USDC authorizations</text></g>
    <g transform="translate(1008 130)"><rect width="150" height="128" rx="18" fill="#ECFDF5" stroke="#10B981"/><circle cx="28" cy="30" r="14" fill="#10B981"/><text x="28" y="35" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">6</text><text x="24" y="66" font-size="16" font-weight="800" fill="#065F46">Proof</text><text x="24" y="92" font-size="12" fill="#047857">tx hash + public</text><text x="24" y="110" font-size="12" fill="#047857">ledger evidence</text></g>
  </g>
  <g stroke="#3B5BDB" stroke-width="3" marker-end="url(#arrow)"><path d="M204 194 H232"/><path d="M396 194 H424"/><path d="M588 194 H616"/><path d="M780 194 H808"/><path d="M972 194 H1000"/></g>
  <text x="48" y="318" font-family="Inter,Segoe UI,Arial" font-size="13" fill="#4A5468">Truth rule: show “intent” until a real tx hash exists; only confirmed settlement rows link to an explorer.</text>
</svg>
